<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="720" height="580" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Hydrogen as a QLF closure — three colour-spanning qubits + the electron</text>
  <text x="360" y="51" text-anchor="middle" font-size="12" fill="#6b7280">a qubit = two orthogonal twists; each twist closes on its complement where two qubits meet (a colour); the electron ties in by two crossing lines</text>

  <!-- qubit edges (the 3 internal qubits, each spanning two colours) -->
  <g stroke="#111827" stroke-width="2.4">
    <line x1="214" y1="290" x2="506" y2="290"/>   <!-- α : R–G -->
    <line x1="524" y1="312" x2="392" y2="452"/>   <!-- β : G–B -->
    <line x1="328" y1="452" x2="196" y2="312"/>   <!-- γ : B–R -->
  </g>
  <text x="360" y="278" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">qubit α  (R–G)</text>
  <text x="486" y="392" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">qubit β  (G–B)</text>
  <text x="232" y="392" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">qubit γ  (B–R)</text>

  <!-- the two orthogonal twist symbols on each qubit -->
  <g font-size="17" font-weight="700">
    <text x="236" y="282" fill="#dc2626">&gt;</text><text x="476" y="282" fill="#16a34a">^</text>     <!-- α: >(R) ^(G) -->
    <text x="520" y="338" fill="#16a34a">v</text><text x="396" y="438" fill="#2563eb">/</text>     <!-- β: v(G) /(B) -->
    <text x="316" y="438" fill="#2563eb">\</text><text x="232" y="338" fill="#dc2626">&lt;</text>     <!-- γ: \(B) <(R) -->
  </g>

  <!-- colour vertices = where two qubits' same-axis twists close on their complement -->
  <circle cx="180" cy="296" r="30" fill="#fff" stroke="#dc2626" stroke-width="2.8"/>
  <text x="180" y="301" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">R</text>
  <text x="180" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">&gt; ↔ &lt;</text>
  <circle cx="540" cy="296" r="30" fill="#fff" stroke="#16a34a" stroke-width="2.8"/>
  <text x="540" y="301" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">G</text>
  <text x="540" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">^ ↔ v</text>
  <circle cx="360" cy="470" r="30" fill="#fff" stroke="#2563eb" stroke-width="2.8"/>
  <text x="360" y="475" text-anchor="middle" font-size="16" font-weight="700" fill="#2563eb">B</text>
  <text x="360" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">/ ↔ \</text>

  <!-- balance dots at the closures -->
  <g>
    <circle cx="180" cy="296" r="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
    <circle cx="540" cy="296" r="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
    <circle cx="360" cy="470" r="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  </g>

  <!-- electron: two crossing lines to a balanced twist tying into qubit α -->
  <line x1="348" y1="112" x2="372" y2="176" stroke="#111827" stroke-width="2.4"/>
  <line x1="372" y1="112" x2="348" y2="176" stroke="#111827" stroke-width="2.4"/>
  <circle cx="360" cy="144" r="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <line x1="360" y1="182" x2="360" y2="284" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="338" y="176" width="44" height="22" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="360" y="192" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6d28d9">twist</text>
  <circle cx="360" cy="92" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">e⁻</text>
  <text x="418" y="96" font-size="11" fill="#1d4ed8">electron (outside)</text>
  <text x="430" y="150" font-size="10.5" font-style="italic" fill="#6b7280">two crossing lines</text>

  <!-- legend -->
  <rect x="16" y="528" width="688" height="44" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="28" y="548" font-size="11.5" fill="#374151">complement pairs <tspan font-weight="700">^↔v · &gt;↔&lt; · /↔\ · +↔−</tspan> · a qubit = two orthogonal twists · balance = a twist meets its complement (amber)</text>
  <text x="28" y="564" font-size="11.5" fill="#374151">proton = 3 colour-spanning qubits (α, β, γ) closing the 3 axes at R, G, B · electron = two crossing lines to a balanced twist · ½-spin sequences run across the colours</text>
</svg>
