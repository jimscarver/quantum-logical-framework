<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 432" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="432" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Particles as twist-pair closures — the individual twist pairs</text>
  <text x="460" y="54" text-anchor="middle" font-size="12.5" fill="#6b7280">each particle = its number of differences, drawn as crossing orthogonal twist pairs (each an in / out propagating pair)</text>

  <!-- ===== 1 · neutrino ===== -->
  <g>
    <ellipse cx="110" cy="160" rx="34" ry="8" fill="none" stroke="#6b7280" stroke-width="2"/>
    <circle cx="144" cy="160" r="5" fill="#6b7280"/><circle cx="76" cy="160" r="5" fill="#6b7280"/>
    <circle cx="110" cy="160" r="2.5" fill="#374151"/>
    <text x="110" y="244" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">neutrino · 1</text>
    <text x="110" y="262" text-anchor="middle" font-size="11.5" fill="#16a34a">stable · 1 twist pair</text>
  </g>

  <!-- ===== 2 · electron / positron ===== -->
  <g>
    <ellipse cx="290" cy="160" rx="34" ry="8" fill="none" stroke="#eab308" stroke-width="2"/>
    <circle cx="324" cy="160" r="5" fill="#eab308"/><circle cx="256" cy="160" r="5" fill="#eab308"/>
    <ellipse cx="290" cy="160" rx="34" ry="8" fill="none" stroke="#111827" stroke-width="2" transform="rotate(90 290 160)"/>
    <circle cx="290" cy="194" r="5" fill="#111827"/><circle cx="290" cy="126" r="5" fill="#111827"/>
    <text x="290" y="244" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">electron · 2</text>
    <text x="290" y="262" text-anchor="middle" font-size="11.5" fill="#16a34a">stable · charge + spin</text>
  </g>

  <!-- ===== 3 · muon ===== -->
  <g>
    <ellipse cx="470" cy="160" rx="34" ry="8" fill="none" stroke="#eab308" stroke-width="2"/>
    <circle cx="504" cy="160" r="5" fill="#eab308"/><circle cx="436" cy="160" r="5" fill="#eab308"/>
    <ellipse cx="470" cy="160" rx="34" ry="8" fill="none" stroke="#111827" stroke-width="2" transform="rotate(60 470 160)"/>
    <circle cx="487" cy="189.4" r="5" fill="#111827"/><circle cx="453" cy="130.6" r="5" fill="#111827"/>
    <ellipse cx="470" cy="160" rx="34" ry="8" fill="none" stroke="#7c3aed" stroke-width="2" transform="rotate(120 470 160)"/>
    <circle cx="453" cy="189.4" r="5" fill="#7c3aed"/><circle cx="487" cy="130.6" r="5" fill="#7c3aed"/>
    <text x="470" y="244" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">muon · 3</text>
    <text x="470" y="262" text-anchor="middle" font-size="11.5" fill="#ea580c">decays · gen 2</text>
  </g>

  <!-- ===== 4 · tau (unstable) ===== -->
  <g>
    <ellipse cx="650" cy="160" rx="44" ry="44" fill="#fff7ed" stroke="#fdba74" stroke-dasharray="6 5"/>
    <ellipse cx="650" cy="160" rx="34" ry="8" fill="none" stroke="#eab308" stroke-width="2"/>
    <circle cx="684" cy="160" r="5" fill="#eab308"/><circle cx="616" cy="160" r="5" fill="#eab308"/>
    <ellipse cx="650" cy="160" rx="34" ry="8" fill="none" stroke="#111827" stroke-width="2" transform="rotate(45 650 160)"/>
    <circle cx="674" cy="184" r="5" fill="#111827"/><circle cx="626" cy="136" r="5" fill="#111827"/>
    <ellipse cx="650" cy="160" rx="34" ry="8" fill="none" stroke="#7c3aed" stroke-width="2" transform="rotate(90 650 160)"/>
    <circle cx="650" cy="194" r="5" fill="#7c3aed"/><circle cx="650" cy="126" r="5" fill="#7c3aed"/>
    <ellipse cx="650" cy="160" rx="34" ry="8" fill="none" stroke="#ea580c" stroke-width="2" transform="rotate(135 650 160)"/>
    <circle cx="626" cy="184" r="5" fill="#ea580c"/><circle cx="674" cy="136" r="5" fill="#ea580c"/>
    <text x="650" y="244" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">tau · 4</text>
    <text x="650" y="262" text-anchor="middle" font-size="11.5" fill="#ea580c">unstable · gen 3 ↓</text>
  </g>

  <!-- ===== 5 · proton (Borromean colour triple + charge + spin) ===== -->
  <g>
    <ellipse cx="822" cy="160" rx="50" ry="48" fill="none" stroke="#9ca3af" stroke-width="1.4"/>
    <!-- colour pairs R G B (Borromean) -->
    <ellipse cx="822" cy="160" rx="36" ry="8" fill="none" stroke="#dc2626" stroke-width="2"/>
    <circle cx="858" cy="160" r="5" fill="#dc2626"/><circle cx="786" cy="160" r="5" fill="#dc2626"/>
    <ellipse cx="822" cy="160" rx="36" ry="8" fill="none" stroke="#16a34a" stroke-width="2" transform="rotate(60 822 160)"/>
    <circle cx="840" cy="191.2" r="5" fill="#16a34a"/><circle cx="804" cy="128.8" r="5" fill="#16a34a"/>
    <ellipse cx="822" cy="160" rx="36" ry="8" fill="none" stroke="#2563eb" stroke-width="2" transform="rotate(120 822 160)"/>
    <circle cx="804" cy="191.2" r="5" fill="#2563eb"/><circle cx="840" cy="128.8" r="5" fill="#2563eb"/>
    <!-- charge + spin pairs (shorter, inner) -->
    <ellipse cx="822" cy="160" rx="20" ry="6" fill="none" stroke="#eab308" stroke-width="2" transform="rotate(30 822 160)"/>
    <circle cx="839.3" cy="170" r="4" fill="#eab308"/><circle cx="804.7" cy="150" r="4" fill="#eab308"/>
    <ellipse cx="822" cy="160" rx="20" ry="6" fill="none" stroke="#111827" stroke-width="2" transform="rotate(150 822 160)"/>
    <circle cx="804.7" cy="170" r="4" fill="#111827"/><circle cx="839.3" cy="150" r="4" fill="#111827"/>
    <text x="822" y="244" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">proton · 5</text>
    <text x="822" y="262" text-anchor="middle" font-size="11.5" fill="#16a34a">stable · 3 colour + charge + spin</text>
  </g>

  <!-- legend -->
  <rect x="16" y="292" width="888" height="124" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="32" y="318" font-size="13" font-weight="700" fill="#374151">A twist pair = one difference (an in / out propagating pair, the ellipse with its two ends):</text>
  <g font-size="12" fill="#374151">
    <circle cx="44" cy="340" r="6" fill="#eab308"/><text x="56" y="344">charge (lateral)</text>
    <circle cx="180" cy="340" r="6" fill="#111827"/><text x="192" y="344">spin (transverse)</text>
    <circle cx="320" cy="340" r="6" fill="#dc2626"/><circle cx="335" cy="340" r="6" fill="#16a34a"/><circle cx="350" cy="340" r="6" fill="#2563eb"/><text x="364" y="344">colour (internal — 3, the Borromean axes)</text>
    <circle cx="640" cy="340" r="6" fill="#7c3aed"/><text x="652" y="344">heavier-generation pairs (internal · open)</text>
  </g>
  <text x="32" y="366" font-size="12" fill="#374151">• Bound <tspan font-weight="700">atoms</tspan> join a heavy particle's pairs to a light partner: positronium (e⁻+e⁺), muonium (μ⁺+e⁻), tau atom (τ⁻+e⁺), hydrogen (p⁺+e⁻).</text>
  <text x="32" y="388" font-size="12" fill="#374151">• <tspan font-weight="700">Leptons</tspan> are <tspan font-weight="700">unlinked</tspan> twist pairs (baryon 0). The <tspan font-weight="700" fill="#dc2626">proton's</tspan> three colour pairs are <tspan font-weight="700">Borromean</tspan>-linked — none pairwise, all three locked (baryon 1).</text>
  <text x="32" y="409" font-size="11.5" font-style="italic" fill="#6b7280">Anchors: baryon = signed 3-axis linking (QLF_BaryonWinding); proton 5 = 3 colour + charge + spin = the π⁵ (QLF_BorromeanAngles / QLF_LenzMassRatio); 3 generations = the 3 axes (QLF_Generations).</text>
</svg>
