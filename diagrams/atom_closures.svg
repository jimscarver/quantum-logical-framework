<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 612" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="612" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Atoms as joint closures — the electron outside the core, twists threading in</text>
  <text x="450" y="52" text-anchor="middle" font-size="12.5" fill="#6b7280">the light partner sits outside the core; its twists thread in and bind to the core's internal twist pairs (orthogonal pairs)</text>

  <!-- ============ POSITRONIUM (TL) ============ -->
  <g>
    <ellipse cx="232" cy="190" rx="150" ry="98" fill="#fbfbfd" stroke="#111827" stroke-width="1.4"/>
    <!-- e- outside (top) -->
    <ellipse cx="232" cy="128" rx="40" ry="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="232" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">e⁻</text>
    <!-- e+ core (bottom) -->
    <ellipse cx="232" cy="232" rx="40" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="232" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">e⁺</text>
    <!-- 2 threading twists -->
    <line x1="210" y1="142" x2="254" y2="218" stroke="#111827" stroke-width="2.4"/>
    <line x1="254" y1="142" x2="210" y2="218" stroke="#111827" stroke-width="2.4"/>
    <!-- 2 internal twist pairs (charge, spin) -->
    <ellipse cx="218" cy="180" rx="13" ry="6.5" fill="none" stroke="#eab308" stroke-width="2" transform="rotate(-38 218 180)"/>
    <circle cx="210" cy="171" r="3" fill="#eab308"/><circle cx="226" cy="189" r="3" fill="#eab308"/>
    <ellipse cx="246" cy="180" rx="13" ry="6.5" fill="none" stroke="#111827" stroke-width="2" transform="rotate(38 246 180)"/>
    <circle cx="254" cy="171" r="3" fill="#111827"/><circle cx="238" cy="189" r="3" fill="#111827"/>
    <text x="232" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">positronium</text>
    <text x="232" y="330" text-anchor="middle" font-size="11.5" fill="#374151">e⁻ + e⁺ · 2 differences · stable-ish</text>
  </g>

  <!-- ============ MUONIUM (TR) ============ -->
  <g>
    <ellipse cx="668" cy="190" rx="150" ry="98" fill="#fbfbfd" stroke="#111827" stroke-width="1.4"/>
    <!-- electron outside (top) -->
    <ellipse cx="668" cy="126" rx="40" ry="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="668" y="131" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">e⁻</text>
    <!-- anti-muon core: 3 orthogonal twist pairs -->
    <ellipse cx="668" cy="214" rx="28" ry="13" fill="none" stroke="#eab308" stroke-width="2"/>
    <circle cx="696" cy="214" r="4" fill="#eab308"/><circle cx="640" cy="214" r="4" fill="#eab308"/>
    <ellipse cx="668" cy="214" rx="28" ry="13" fill="none" stroke="#111827" stroke-width="2" transform="rotate(60 668 214)"/>
    <circle cx="682" cy="238.2" r="4" fill="#111827"/><circle cx="654" cy="189.8" r="4" fill="#111827"/>
    <ellipse cx="668" cy="214" rx="28" ry="13" fill="none" stroke="#db2777" stroke-width="2" transform="rotate(120 668 214)"/>
    <circle cx="654" cy="238.2" r="4" fill="#db2777"/><circle cx="682" cy="189.8" r="4" fill="#db2777"/>
    <text x="668" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">μ⁺ core</text>
    <!-- threading twists from electron into core -->
    <line x1="648" y1="140" x2="660" y2="196" stroke="#111827" stroke-width="2.2"/>
    <line x1="688" y1="140" x2="676" y2="196" stroke="#111827" stroke-width="2.2"/>
    <text x="668" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">muonium</text>
    <text x="668" y="330" text-anchor="middle" font-size="11.5" fill="#374151">μ⁺ core + e⁻ · 3 differences · decays</text>
  </g>

  <!-- ============ TAU ATOM (BL) ============ -->
  <g>
    <ellipse cx="232" cy="430" rx="150" ry="98" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="7 5"/>
    <!-- positron outside (top) -->
    <ellipse cx="232" cy="366" rx="40" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="232" y="371" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">e⁺</text>
    <!-- tau core: 4 orthogonal twist pairs -->
    <ellipse cx="232" cy="452" rx="28" ry="13" fill="none" stroke="#eab308" stroke-width="2"/>
    <circle cx="260" cy="452" r="4" fill="#eab308"/><circle cx="204" cy="452" r="4" fill="#eab308"/>
    <ellipse cx="232" cy="452" rx="28" ry="13" fill="none" stroke="#111827" stroke-width="2" transform="rotate(45 232 452)"/>
    <circle cx="252" cy="472" r="4" fill="#111827"/><circle cx="212" cy="432" r="4" fill="#111827"/>
    <ellipse cx="232" cy="452" rx="28" ry="13" fill="none" stroke="#db2777" stroke-width="2" transform="rotate(90 232 452)"/>
    <circle cx="232" cy="480" r="4" fill="#db2777"/><circle cx="232" cy="424" r="4" fill="#db2777"/>
    <ellipse cx="232" cy="452" rx="28" ry="13" fill="none" stroke="#7c3aed" stroke-width="2" transform="rotate(135 232 452)"/>
    <circle cx="212" cy="472" r="4" fill="#7c3aed"/><circle cx="252" cy="432" r="4" fill="#7c3aed"/>
    <text x="232" y="502" text-anchor="middle" font-size="10" font-weight="700" fill="#2563eb">τ⁻ core</text>
    <line x1="212" y1="380" x2="222" y2="434" stroke="#111827" stroke-width="2.2"/>
    <line x1="252" y1="380" x2="242" y2="434" stroke="#111827" stroke-width="2.2"/>
    <text x="232" y="552" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">tau atom</text>
    <text x="232" y="570" text-anchor="middle" font-size="11.5" fill="#ea580c">τ⁻ core + e⁺ · 4 differences · too short-lived → neutron → proton</text>
  </g>

  <!-- ============ HYDROGEN (BR) ============ -->
  <g>
    <ellipse cx="668" cy="430" rx="155" ry="100" fill="#fbfbfd" stroke="#111827" stroke-width="1.4"/>
    <!-- electron outside (top) -->
    <ellipse cx="668" cy="362" rx="46" ry="19" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="668" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">electron e⁻</text>
    <!-- proton core: 3 colour quark twist pairs (Borromean) -->
    <ellipse cx="640" cy="442" rx="30" ry="15" fill="none" stroke="#dc2626" stroke-width="2.2" transform="rotate(-25 640 442)"/>
    <circle cx="667" cy="430.5" r="4.5" fill="#dc2626"/><circle cx="613" cy="453.5" r="4.5" fill="#dc2626"/>
    <ellipse cx="696" cy="442" rx="30" ry="15" fill="none" stroke="#16a34a" stroke-width="2.2" transform="rotate(25 696 442)"/>
    <circle cx="669" cy="430.5" r="4.5" fill="#16a34a"/><circle cx="723" cy="453.5" r="4.5" fill="#16a34a"/>
    <ellipse cx="668" cy="470" rx="30" ry="15" fill="none" stroke="#2563eb" stroke-width="2.2" transform="rotate(90 668 470)"/>
    <circle cx="668" cy="497" r="4.5" fill="#2563eb"/><circle cx="668" cy="443" r="4.5" fill="#2563eb"/>
    <text x="668" y="512" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">p⁺ core · 3 Borromean colour pairs</text>
    <!-- threading twists: electron into the proton core -->
    <line x1="642" y1="378" x2="690" y2="462" stroke="#111827" stroke-width="2.6"/>
    <line x1="694" y1="378" x2="646" y2="462" stroke="#111827" stroke-width="2.6"/>
    <text x="668" y="552" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">hydrogen</text>
    <text x="668" y="570" text-anchor="middle" font-size="11.5" fill="#374151">p⁺ core + e⁻ · 5 differences · stable</text>
  </g>

  <!-- legend -->
  <rect x="16" y="586" width="868" height="0" fill="none"/>
  <text x="450" y="600" text-anchor="middle" font-size="11.5" font-style="italic" fill="#6b7280">A twist pair (orthogonal pair) = one difference: charge (yellow) · spin (black) · colour (R G B, internal). Leptons unlinked (baryon 0); proton's colour triple Borromean (baryon 1). Anchors: QLF_BaryonWinding · QLF_BorromeanAngles · QLF_Generations.</text>
</svg>
