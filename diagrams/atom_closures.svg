<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="600" height="540" fill="#ffffff"/>
  <text x="300" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">Atom folds — ^&gt; out of the electron, twists in the nucleus, v&lt; back to close</text>
  <text x="300" y="50" text-anchor="middle" font-size="12" fill="#6b7280">a twist = two symbols; each added qubit adds a new direction; the fold opens and closes at the electron</text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- ===================== POSITRONIUM ===================== -->
  <text x="40" y="92" font-size="13.5" font-weight="700" fill="#111827">positronium</text>
  <path d="M100,108 Q255,70 400,108" fill="none" stroke="#111827" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="252" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">^&gt;</text>
  <path d="M400,124 Q255,162 108,124" fill="none" stroke="#111827" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="252" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">v&lt;</text>
  <circle cx="92" cy="116" r="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="92" y="121" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">e⁻</text>
  <circle cx="412" cy="116" r="20" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/><text x="412" y="121" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">e⁺</text>

  <line x1="40" y1="186" x2="560" y2="186" stroke="#eef2f7" stroke-width="1.4"/>

  <!-- ===================== MUONIUM ===================== -->
  <text x="40" y="226" font-size="13.5" font-weight="700" fill="#111827">muonium</text>
  <g stroke="#111827" stroke-width="2.2" fill="none" marker-end="url(#ar)">
    <line x1="112" y1="262" x2="196" y2="258"/>
    <line x1="256" y1="262" x2="300" y2="278"/>
  </g>
  <path d="M334,290 Q230,330 116,272" fill="none" stroke="#111827" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="150" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">^&gt;</text>
  <text x="232" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">v&lt;</text>
  <circle cx="92" cy="266" r="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="92" y="271" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">e⁻</text>
  <rect x="198" y="244" width="50" height="28" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="223" y="263" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">/v</text>
  <rect x="300" y="270" width="50" height="28" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="325" y="289" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">&gt;\</text>
  <text x="276" y="244" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">muon = /v &gt;\</text>

  <line x1="40" y1="346" x2="560" y2="346" stroke="#eef2f7" stroke-width="1.4"/>

  <!-- ===================== HYDROGEN ===================== -->
  <text x="40" y="386" font-size="13.5" font-weight="700" fill="#111827">hydrogen</text>
  <g stroke="#111827" stroke-width="2.2" fill="none" marker-end="url(#ar)">
    <line x1="112" y1="422" x2="180" y2="418"/>
    <line x1="236" y1="420" x2="282" y2="420"/>
    <line x1="338" y1="420" x2="384" y2="420"/>
  </g>
  <path d="M440,434 Q260,492 116,432" fill="none" stroke="#111827" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="146" y="404" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">^&gt;</text>
  <text x="270" y="486" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">v&lt;</text>
  <circle cx="92" cy="426" r="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="92" y="431" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">e⁻</text>
  <rect x="182" y="406" width="50" height="28" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="207" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">/v</text>
  <rect x="284" y="406" width="50" height="28" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="309" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">&gt;\</text>
  <rect x="386" y="406" width="54" height="28" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="2"/><text x="413" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">+−</text>
  <text x="340" y="404" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">nucleus = muon + gauge (+−)</text>

  <text x="300" y="524" text-anchor="middle" font-size="11.5" fill="#374151">positronium: e⁻ ^&gt; v&lt; · muonium: e⁻ ^&gt; /v &gt;\ v&lt; · hydrogen: e⁻ ^&gt; /v &gt;\ +− v&lt;</text>
</svg>
