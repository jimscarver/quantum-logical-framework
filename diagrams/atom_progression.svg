<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1210 470" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1210" height="470" fill="#ffffff"/>
  <text x="605" y="26" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">QLF closures — the difference ladder, drawn the same way</text>
  <text x="605" y="46" text-anchor="middle" font-size="12.5" fill="#6b7280">each closure starts at the electron with ^&gt;, traverses its internal dimensions end-to-end, and returns to close · spin ^v · charge/handedness &lt;&gt; · internal /\ , +−</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
  </defs>

  <line x1="247" y1="70" x2="247" y2="440" stroke="#eef2f7" stroke-width="1.4"/>
  <line x1="492" y1="70" x2="492" y2="440" stroke="#eef2f7" stroke-width="1.4"/>
  <line x1="737" y1="70" x2="737" y2="440" stroke="#eef2f7" stroke-width="1.4"/>

  <!-- =================================================== NEUTRINO (1) =================================================== -->
  <text x="123" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">neutrino</text>
  <text x="123" y="108" text-anchor="middle" font-size="11" fill="#2563eb">one difference</text>
  <ellipse cx="123" cy="250" rx="95" ry="135" fill="#fafafa" stroke="#374151" stroke-width="1.6"/>
  <!-- gauge-dominant loop ^ + v - (no <> spatial width) -->
  <line x1="123" y1="170" x2="178" y2="250" stroke="#ea580c" stroke-width="2.6" marker-end="url(#arr)"/>
  <line x1="178" y1="250" x2="123" y2="330" stroke="#ea580c" stroke-width="2.6" marker-end="url(#arr)"/>
  <line x1="123" y1="330" x2="68" y2="250" stroke="#ea580c" stroke-width="2.6" marker-end="url(#arr)"/>
  <line x1="68" y1="250" x2="123" y2="170" stroke="#ea580c" stroke-width="2.6" marker-end="url(#arr)"/>
  <circle cx="123" cy="165" r="7" fill="#16a34a"/><text x="123" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">^</text>
  <circle cx="183" cy="250" r="7" fill="#a16207"/><text x="198" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">+</text>
  <circle cx="123" cy="335" r="7" fill="#16a34a"/><text x="123" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">v</text>
  <circle cx="63" cy="250" r="7" fill="#a16207"/><text x="48" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">−</text>
  <text x="123" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">^+v−</text>
  <text x="123" y="430" text-anchor="middle" font-size="10" fill="#6b7280">gauge-dominant, no &lt;&gt; width</text>

  <!-- =================================================== POSITRONIUM (2) =================================================== -->
  <text x="370" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">positronium</text>
  <text x="370" y="108" text-anchor="middle" font-size="11" fill="#2563eb">two differences</text>
  <ellipse cx="370" cy="255" rx="105" ry="135" fill="#fafafa" stroke="#374151" stroke-width="1.6"/>
  <!-- electron (top) + positron (bottom) -->
  <ellipse cx="370" cy="160" rx="62" ry="26" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="370" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">^&gt;</text>
  <text x="370" y="146" text-anchor="middle" font-size="10" fill="#1d4ed8">e⁻</text>
  <ellipse cx="370" cy="350" rx="62" ry="26" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="370" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">v&lt;</text>
  <text x="370" y="336" text-anchor="middle" font-size="10" fill="#b91c1c">e⁺</text>
  <!-- positron has ZERO internal dimensions: just the e⁻↔e⁺ pairing -->
  <!-- closure: two legs, both terminating at the electron (and the positron) -->
  <line x1="348" y1="184" x2="348" y2="326" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arr)"/>
  <line x1="392" y1="326" x2="392" y2="184" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arr)"/>
  <text x="370" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">^&lt;v&gt;^&gt;v&lt;</text>
  <text x="370" y="430" text-anchor="middle" font-size="10" fill="#6b7280">electron ++ positron · positron has no internal dim</text>

  <!-- =================================================== MUONIUM (3) =================================================== -->
  <text x="615" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">muonium</text>
  <text x="615" y="108" text-anchor="middle" font-size="11" fill="#2563eb">three differences</text>
  <ellipse cx="615" cy="255" rx="108" ry="135" fill="#fafafa" stroke="#374151" stroke-width="1.6"/>
  <!-- electron (top) -->
  <ellipse cx="615" cy="155" rx="58" ry="24" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="615" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">^&gt;</text>
  <text x="615" y="141" text-anchor="middle" font-size="10" fill="#1d4ed8">e⁻</text>
  <!-- antimuon (bottom) — holds ONE internal dimension /\ -->
  <ellipse cx="615" cy="338" rx="82" ry="52" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="298" text-anchor="middle" font-size="10" fill="#6d28d9">μ⁺ — one internal dimension</text>
  <line x1="586" y1="324" x2="644" y2="360" stroke="#2563eb" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="586" cy="324" r="6" fill="#2563eb"/><text x="573" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">/</text>
  <circle cx="644" cy="360" r="6" fill="#2563eb"/><text x="657" y="371" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">\</text>
  <!-- closure: electron ^> -> traverse the antimuon's /\ end-to-end -> back v< -->
  <line x1="608" y1="178" x2="588" y2="318" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arr)"/>
  <line x1="586" y1="324" x2="644" y2="360" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arr)"/>
  <line x1="644" y1="360" x2="622" y2="178" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arr)"/>
  <text x="615" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">^&lt;v&gt;^&gt;v&lt;/\</text>
  <text x="615" y="430" text-anchor="middle" font-size="10" fill="#6b7280">electron ++ antimuon · its 1 internal dim /\</text>

  <!-- =================================================== HYDROGEN (5) =================================================== -->
  <text x="858" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">hydrogen</text>
  <text x="858" y="108" text-anchor="middle" font-size="11" fill="#2563eb">five differences</text>
  <ellipse cx="858" cy="255" rx="108" ry="135" fill="#fafafa" stroke="#374151" stroke-width="1.6"/>
  <ellipse cx="858" cy="158" rx="60" ry="25" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="858" y="163" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">^&gt;</text>
  <text x="858" y="144" text-anchor="middle" font-size="10" fill="#1d4ed8">e⁻</text>
  <!-- proton = 3 quark dots -->
  <circle cx="820" cy="300" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="820" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">u</text>
  <circle cx="896" cy="300" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="896" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">u</text>
  <circle cx="858" cy="350" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="858" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">d</text>
  <!-- 3 internal colour dims +−,^v,/\ across quarks + charge <> -->
  <line x1="820" y1="300" x2="896" y2="300" stroke="#dc2626" stroke-width="3.5"/>
  <line x1="896" y1="300" x2="858" y2="350" stroke="#16a34a" stroke-width="3.5"/>
  <line x1="858" y1="350" x2="820" y2="300" stroke="#2563eb" stroke-width="3.5"/>
  <text x="858" y="290" text-anchor="middle" font-size="9" fill="#dc2626">+−</text>
  <text x="884" y="335" text-anchor="middle" font-size="9" fill="#16a34a">^v</text>
  <text x="832" y="335" text-anchor="middle" font-size="9" fill="#2563eb">/\</text>
  <!-- closure: two legs, BOTH terminating at the electron; traverse the colour triangle -->
  <line x1="850" y1="180" x2="826" y2="288" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="890" y1="288" x2="866" y2="180" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="832" y1="312" x2="846" y2="338" stroke="#ea580c" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="870" y1="338" x2="884" y2="312" stroke="#ea580c" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="858" cy="232" rx="20" ry="10" fill="none" stroke="#a16207" stroke-width="1.4"/><text x="858" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#a16207">&lt;&gt;</text>
  <text x="858" y="412" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ea580c">^&lt;v&gt;^&gt;v&lt;/\+−</text>
  <text x="858" y="430" text-anchor="middle" font-size="9.5" fill="#6b7280">e⁻ + proton (electron OUT) — quark detail: hydrogen_proton_quarks.svg</text>

  <line x1="982" y1="70" x2="982" y2="440" stroke="#eef2f7" stroke-width="1.4"/>

  <!-- =================================================== NEUTRON (electron-in) =================================================== -->
  <text x="1096" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">neutron</text>
  <text x="1096" y="108" text-anchor="middle" font-size="11" fill="#2563eb">the electron-in twin</text>
  <ellipse cx="1096" cy="255" rx="108" ry="135" fill="#fafafa" stroke="#374151" stroke-width="1.6"/>
  <text x="1096" y="158" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">no external electron</text>
  <text x="1096" y="174" text-anchor="middle" font-size="10" fill="#b91c1c">−1 folded in (one u→d)</text>
  <!-- proton-like triangle but udd -->
  <circle cx="1058" cy="300" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="1058" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">u</text>
  <circle cx="1134" cy="300" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="1134" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">d</text>
  <circle cx="1096" cy="350" r="15" fill="#fff" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3 2"/><text x="1096" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">d</text>
  <line x1="1058" y1="300" x2="1134" y2="300" stroke="#dc2626" stroke-width="3.5"/>
  <line x1="1134" y1="300" x2="1096" y2="350" stroke="#16a34a" stroke-width="3.5"/>
  <line x1="1096" y1="350" x2="1058" y2="300" stroke="#2563eb" stroke-width="3.5"/>
  <text x="1096" y="290" text-anchor="middle" font-size="9" fill="#dc2626">+−</text>
  <text x="1122" y="335" text-anchor="middle" font-size="9" fill="#16a34a">^v</text>
  <text x="1070" y="335" text-anchor="middle" font-size="9" fill="#2563eb">/\</text>
  <!-- internal closure: a directed triangle through the quarks (no electron leg) -->
  <line x1="1076" y1="300" x2="1116" y2="300" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="1117" y1="312" x2="1101" y2="338" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr)"/>
  <line x1="1091" y1="338" x2="1071" y2="312" stroke="#ea580c" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="1096" y="412" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ea580c">udd (charge 0)</text>
  <text x="1096" y="430" text-anchor="middle" font-size="9.5" fill="#6b7280">metastable: n → H + ν̄</text>
</svg>
