<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="440" fill="#ffffff"/>
  <defs>
    <marker id="bluehead" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="greenhead" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <text x="380" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">The half-spin — balanced and prime</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#6b7280">three steps forward, then three back; it closes only at 720°</text>

  <!-- the rotation, centered at (215,235) -->
  <g transform="translate(215,235)">
    <!-- outer loop: TURN 1, forward (clockwise), 330° arc -->
    <path d="M 24.6 -91.8 A 95 95 0 1 1 -24.6 -91.8" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#bluehead)"/>
    <!-- inner loop: TURN 2, back (counter-clockwise), 330° arc -->
    <path d="M -18.1 -67.6 A 70 70 0 1 0 18.1 -67.6" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#greenhead)"/>

    <!-- the 3 step positions = a triangle (3 × 120°) -->
    <polygon points="0,-48 41.6,24 -41.6,24" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
    <circle cx="0" cy="-48" r="4.5" fill="#d97706"/><text x="0" y="-58" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">1</text>
    <circle cx="41.6" cy="24" r="4.5" fill="#d97706"/><text x="55" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">2</text>
    <circle cx="-41.6" cy="24" r="4.5" fill="#d97706"/><text x="-55" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">3</text>
    <text x="0" y="6" text-anchor="middle" font-size="11" fill="#92400e">3 × 120°</text>

    <!-- start / identity marker -->
    <circle cx="0" cy="-95" r="4" fill="#111827"/>
    <text x="0" y="-104" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">+I  start</text>
  </g>

  <!-- right panel -->
  <g transform="translate(430,120)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#111827">720° = two full turns</text>
    <circle cx="8" cy="36" r="6" fill="#2563eb"/>
    <text x="24" y="33" font-size="13.5" fill="#1f2937" font-weight="600">Turn 1 — 3 steps × 120° forward</text>
    <text x="24" y="52" font-size="13" fill="#4b5563">→ reaches −I (360°)</text>
    <circle cx="8" cy="86" r="6" fill="#059669"/>
    <text x="24" y="83" font-size="13.5" fill="#1f2937" font-weight="600">Turn 2 — 3 steps × 120° back</text>
    <text x="24" y="102" font-size="13" fill="#4b5563">→ returns to +I (720°)</text>

    <rect x="0" y="126" width="300" height="2" fill="#e5e7eb"/>
    <text x="0" y="152" font-size="14" font-weight="700" fill="#1d4ed8">Balanced</text>
    <text x="84" y="152" font-size="13" fill="#374151">returns to identity (+I) = ZFA</text>
    <text x="0" y="178" font-size="14" font-weight="700" fill="#b45309">Prime</text>
    <text x="60" y="178" font-size="13" fill="#374151">3 steps, irreducible — the proton's lock</text>
  </g>

  <text x="380" y="422" text-anchor="middle" font-size="11.5" font-style="italic" fill="#9ca3af">structural reading (3-axis / 120° cut); the machine-verified fold_electron is the 4-twist 2-D cut, not yet a proof of the 3-D fold</text>
</svg>
