<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 372" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="780" height="372" fill="#ffffff"/>
  <text x="390" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">The prime ladder — the substrate's irreducible structure</text>
  <text x="390" y="54" text-anchor="middle" font-size="12.5" fill="#6b7280">orthogonality is one bit; each prime is a closure lock — 2/3/5/13 geometric, 7/11/31 counts, 17/19 the honest gap</text>

  <!-- baseline -->
  <line x1="48" y1="200" x2="732" y2="200" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- sector brackets -->
  <path d="M225,118 C 225,104 455,104 455,118" fill="none" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="340" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">icosahedral pair</text>
  <path d="M305,150 C 305,140 385,140 385,150" fill="none" stroke="#2563eb" stroke-width="1.6"/>
  <text x="345" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">QCD-coupling pair</text>
  <!-- E8 link from icosahedral region to 31 -->
  <path d="M455,200 C 560,250 620,250 700,212" fill="none" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="585" y="262" text-anchor="middle" font-size="11.5" font-style="italic" fill="#6d28d9">2I → E₈ (McKay)</text>

  <!-- nodes: x = 65,145,225,305,385,465,545,625,705 -->
  <!-- geometric (purple): 2,3,5,13 ; count (blue): 7,11,31 ; gap (grey dashed): 17,19 -->
  <g text-anchor="middle">
    <!-- 2 -->
    <circle cx="65" cy="200" r="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="65" y="206" font-size="17" font-weight="700" fill="#6d28d9">2</text>
    <text x="65" y="240" font-size="11.5" fill="#374151">the bit</text>
    <text x="65" y="255" font-size="11" fill="#6b7280">spin</text>
    <!-- 3 -->
    <circle cx="145" cy="200" r="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="145" y="206" font-size="17" font-weight="700" fill="#6d28d9">3</text>
    <text x="145" y="240" font-size="11.5" fill="#374151">axes</text>
    <text x="145" y="255" font-size="11" fill="#6b7280">proton</text>
    <!-- 5 -->
    <circle cx="225" cy="200" r="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.4"/>
    <text x="225" y="206" font-size="17" font-weight="700" fill="#6d28d9">5</text>
    <text x="225" y="240" font-size="11.5" fill="#374151">icosa 5-fold</text>
    <text x="225" y="255" font-size="11" fill="#6b7280">d-orbital</text>
    <!-- 7 -->
    <circle cx="305" cy="200" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="305" y="206" font-size="17" font-weight="700" fill="#1d4ed8">7</text>
    <text x="305" y="240" font-size="11.5" fill="#374151">QCD b₀</text>
    <text x="305" y="255" font-size="11" fill="#6b7280">net</text>
    <!-- 11 -->
    <circle cx="385" cy="200" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="385" y="206" font-size="17" font-weight="700" fill="#1d4ed8">11</text>
    <text x="385" y="240" font-size="11.5" fill="#374151">antiscreen</text>
    <text x="385" y="255" font-size="11" fill="#6b7280">11N_c/3</text>
    <!-- 13 -->
    <circle cx="465" cy="200" r="22" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.4"/>
    <text x="465" y="206" font-size="17" font-weight="700" fill="#6d28d9">13</text>
    <text x="465" y="240" font-size="11.5" fill="#374151">1+12 cluster</text>
    <text x="465" y="255" font-size="11" fill="#6b7280">Mackay</text>
    <!-- 17 (gap) -->
    <circle cx="545" cy="200" r="20" fill="#ffffff" stroke="#9ca3af" stroke-width="1.8" stroke-dasharray="4 4"/>
    <text x="545" y="206" font-size="16" font-weight="700" fill="#9ca3af">17</text>
    <!-- 19 (gap) -->
    <circle cx="625" cy="200" r="20" fill="#ffffff" stroke="#9ca3af" stroke-width="1.8" stroke-dasharray="4 4"/>
    <text x="625" y="206" font-size="16" font-weight="700" fill="#9ca3af">19</text>
    <text x="585" y="244" font-size="11.5" fill="#6b7280">no substrate lock</text>
    <text x="585" y="259" font-size="11" fill="#9ca3af">number-theoretic only</text>
    <!-- 31 -->
    <circle cx="705" cy="200" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="705" y="206" font-size="16" font-weight="700" fill="#1d4ed8">31</text>
    <text x="705" y="240" font-size="11.5" fill="#374151">E₈ apex</text>
    <text x="705" y="255" font-size="11" fill="#6b7280">248=8·31</text>
  </g>

  <!-- legend -->
  <g font-size="11.5">
    <circle cx="250" cy="345" r="7" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="263" y="349" fill="#374151">geometric prime</text>
    <circle cx="400" cy="345" r="7" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="413" y="349" fill="#374151">derived count</text>
    <circle cx="535" cy="345" r="7" fill="#ffffff" stroke="#9ca3af" stroke-width="1.8" stroke-dasharray="4 4"/>
    <text x="548" y="349" fill="#374151">the gap (no lock)</text>
  </g>
</svg>
