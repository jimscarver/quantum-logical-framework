<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="860" height="660" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Hydrogen — closures across quarks inside the proton Markov blanket</text>
  <text x="430" y="50" text-anchor="middle" font-size="13" fill="#6b7280">five differences = 3 colour + charge + spin · each difference is one orthogonal querk pair (a qubit) spanning two quarks</text>

  <defs>
    <marker id="pur" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
    <marker id="pnk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#db2777"/></marker>
  </defs>

  <!-- ===================== PROTON MARKOV BLANKET ===================== -->
  <ellipse cx="300" cy="390" rx="270" ry="235" fill="#fafafa" stroke="#374151" stroke-width="2"/>
  <ellipse cx="300" cy="390" rx="252" ry="218" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="300" y="645" text-anchor="middle" font-size="16" font-weight="700" fill="#374151">Proton  (uud)  —  Markov blanket</text>

  <!-- ===================== THREE QUARKS ===================== -->
  <!-- q1 (u) left, q2 (u) right, q3 (d) bottom -->
  <circle cx="175" cy="370" r="66" fill="#ffffff" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3"/>
  <circle cx="440" cy="345" r="66" fill="#ffffff" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3"/>
  <circle cx="300" cy="540" r="66" fill="#ffffff" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="175" y="320" text-anchor="middle" font-size="11" fill="#6b7280">quark</text>
  <text x="440" y="295" text-anchor="middle" font-size="11" fill="#6b7280">quark</text>
  <text x="300" y="592" text-anchor="middle" font-size="11" fill="#6b7280">quark</text>
  <text x="175" y="378" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">u</text>
  <text x="440" y="353" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">u</text>
  <text x="300" y="548" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">d</text>

  <!-- ===================== COLOUR QUERK PAIRS (closures across quarks, Borromean) ===================== -->
  <!-- each colour axis = one orthogonal querk pair whose two dots sit in two different quarks -->
  <!-- R : q1<->q2  (red) -->
  <line x1="232" y1="360" x2="383" y2="349" stroke="#111827" stroke-width="2"/>
  <ellipse cx="307" cy="354" rx="86" ry="20" fill="none" stroke="#db2777" stroke-width="2" transform="rotate(-4 307 354)"/>
  <circle cx="232" cy="360" r="9" fill="#dc2626"/><circle cx="383" cy="349" r="9" fill="#dc2626"/>
  <text x="307" y="332" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">colour R  (axis &lt;&gt;)</text>
  <!-- G : q2<->q3  (green) -->
  <line x1="408" y1="402" x2="333" y2="487" stroke="#111827" stroke-width="2"/>
  <ellipse cx="370" cy="444" rx="72" ry="19" fill="none" stroke="#7c3aed" stroke-width="2" transform="rotate(132 370 444)"/>
  <circle cx="408" cy="402" r="9" fill="#16a34a"/><circle cx="333" cy="487" r="9" fill="#16a34a"/>
  <text x="430" y="455" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">colour G  (axis ^v)</text>
  <!-- B : q3<->q1  (blue) -->
  <line x1="262" y1="496" x2="200" y2="425" stroke="#111827" stroke-width="2"/>
  <ellipse cx="231" cy="460" rx="58" ry="18" fill="none" stroke="#111827" stroke-width="2" transform="rotate(49 231 460)"/>
  <circle cx="262" cy="496" r="9" fill="#2563eb"/><circle cx="200" cy="425" r="9" fill="#2563eb"/>
  <text x="150" y="470" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">colour B  (axis /\)</text>

  <!-- ===================== CHARGE QUERKS (yellow, lateral) — per quark ===================== -->
  <circle cx="158" cy="392" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/><text x="158" y="414" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">+2/3</text>
  <circle cx="458" cy="367" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/><text x="458" y="389" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">+2/3</text>
  <circle cx="300" cy="518" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/><text x="300" y="512" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">−1/3</text>
  <text x="300" y="430" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">charge sum = +1</text>

  <!-- ===================== SPIN QUERKS (black, transverse) ===================== -->
  <circle cx="200" cy="350" r="7" fill="#111827"/>
  <circle cx="300" cy="500" r="7" fill="#111827"/>
  <line x1="200" y1="350" x2="300" y2="500" stroke="#111827" stroke-width="1.4" stroke-dasharray="2 3"/>

  <!-- ===================== INWARD / OUTWARD PROPAGATION ARROWS ===================== -->
  <path d="M232,360 L300,388" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#pur)"/>
  <path d="M383,349 L455,318" fill="none" stroke="#db2777" stroke-width="3" marker-end="url(#pnk)"/>

  <!-- ===================== ELECTRON (on top of the blanket) ===================== -->
  <ellipse cx="300" cy="150" rx="118" ry="50" fill="#fdf2f8" stroke="#d63384" stroke-width="2.4"/>
  <ellipse cx="300" cy="150" rx="92" ry="34" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <line x1="250" y1="135" x2="350" y2="165" stroke="#111827" stroke-width="2"/>
  <line x1="350" y1="135" x2="250" y2="165" stroke="#111827" stroke-width="2"/>
  <circle cx="250" cy="135" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/>
  <circle cx="350" cy="135" r="7" fill="#111827"/>
  <circle cx="250" cy="165" r="7" fill="#111827"/>
  <circle cx="350" cy="165" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/>
  <text x="232" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">−</text>
  <text x="300" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">electron</text>
  <text x="300" y="210" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">charge −1, outside the baryon (vs neutron: −1 folded in → udd)</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(600,250)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#111827">querks (the dots)</text>
    <circle cx="12" cy="24" r="8" fill="#f5c518" stroke="#a16207" stroke-width="1"/><text x="30" y="28" font-size="12" fill="#374151">charge querk — lateral</text>
    <circle cx="12" cy="50" r="7" fill="#111827"/><text x="30" y="54" font-size="12" fill="#374151">spin querk — transverse</text>
    <circle cx="6" cy="76" r="7" fill="#dc2626"/><circle cx="20" cy="76" r="7" fill="#16a34a"/><circle cx="34" cy="76" r="7" fill="#2563eb"/>
    <text x="48" y="80" font-size="12" fill="#374151">colour querks — the 3 axes</text>

    <text x="0" y="116" font-size="13" font-weight="700" fill="#111827">querk pairs (the ovals)</text>
    <ellipse cx="20" cy="140" rx="20" ry="9" fill="none" stroke="#db2777" stroke-width="2"/>
    <ellipse cx="20" cy="140" rx="20" ry="9" fill="none" stroke="#7c3aed" stroke-width="2" transform="translate(46,0)"/>
    <text x="92" y="144" font-size="12" fill="#374151">orthogonal querk pair (qubit)</text>

    <text x="0" y="180" font-size="13" font-weight="700" fill="#111827">propagation</text>
    <line x1="2" y1="202" x2="40" y2="202" stroke="#7c3aed" stroke-width="3" marker-end="url(#pur)"/>
    <text x="50" y="206" font-size="12" fill="#374151">inward querk pair</text>
    <line x1="2" y1="226" x2="40" y2="226" stroke="#db2777" stroke-width="3" marker-end="url(#pnk)"/>
    <text x="50" y="230" font-size="12" fill="#374151">outward pair propagation</text>

    <text x="0" y="272" font-size="11" fill="#6b7280" font-style="italic">3 colour pairs are Borromean —</text>
    <text x="0" y="288" font-size="11" fill="#6b7280" font-style="italic">each links two quarks; all three</text>
    <text x="0" y="304" font-size="11" fill="#6b7280" font-style="italic">needed to close (confinement).</text>
  </g>
</svg>
