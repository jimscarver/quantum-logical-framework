<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 710" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="880" height="710" fill="#ffffff"/>
  <text x="440" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Hydrogen — the closure traversing the 3 internal dimensions end-to-end</text>
  <text x="440" y="48" text-anchor="middle" font-size="13" fill="#6b7280">3 internal dimensions = 3 bits of two (axes with two ends); the closure traverses each one end-to-end, across the quarks</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">electron → along B (/→\) → along G (v→^) → along R (+→−) → back to the electron (closes)</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
  </defs>

  <!-- ===================== PROTON MARKOV BLANKET ===================== -->
  <ellipse cx="300" cy="430" rx="262" ry="248" fill="#fafafa" stroke="#374151" stroke-width="2"/>
  <text x="300" y="694" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Proton (uud) — Markov blanket</text>

  <!-- ===================== THE 3 INTERNAL DIMENSIONS (coloured chords, each a bit of two) ===================== -->
  <!-- drawn thick; the closure runs ALONG them -->
  <line x1="300" y1="295" x2="300" y2="565" stroke="#2563eb" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="417" y1="362" x2="183" y2="498" stroke="#16a34a" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="417" y1="498" x2="183" y2="362" stroke="#dc2626" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

  <!-- ===================== THREE QUARKS (each oval holds two dimension-ends) ===================== -->
  <ellipse cx="241" cy="328" rx="84" ry="46" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3" transform="rotate(-30 241 328)"/>
  <ellipse cx="417" cy="430" rx="84" ry="46" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3" transform="rotate(90 417 430)"/>
  <ellipse cx="241" cy="531" rx="84" ry="46" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3" transform="rotate(30 241 531)"/>
  <text x="232" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">quark u</text>
  <text x="476" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">quark u</text>
  <text x="232" y="568" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">quark d</text>

  <!-- ===================== CLOSURE: traverse each dimension end-to-end + connectors + electron legs ===================== -->
  <!-- out: electron -> / -->
  <line x1="300" y1="198" x2="300" y2="286" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>
  <!-- along B: / -> \ -->
  <line x1="300" y1="304" x2="300" y2="556" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>
  <!-- connector \ -> v -->
  <line x1="296" y1="562" x2="192" y2="502" stroke="#ea580c" stroke-width="3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <!-- along G: v -> ^ -->
  <line x1="188" y1="492" x2="412" y2="368" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>
  <!-- connector ^ -> > -->
  <line x1="419" y1="368" x2="419" y2="490" stroke="#ea580c" stroke-width="3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <!-- along R: > -> < -->
  <line x1="410" y1="496" x2="190" y2="366" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>
  <!-- back: < -> electron (closes) -->
  <line x1="180" y1="356" x2="292" y2="198" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>

  <!-- ===================== THE 6 ENDS (twist symbols, coloured by dimension) ===================== -->
  <circle cx="300" cy="295" r="8" fill="#2563eb"/><text x="316" y="290" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">/</text>
  <circle cx="300" cy="565" r="8" fill="#2563eb"/><text x="316" y="585" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">\</text>
  <circle cx="417" cy="362" r="8" fill="#16a34a"/><text x="436" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">^</text>
  <circle cx="183" cy="498" r="8" fill="#16a34a"/><text x="166" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">v</text>
  <circle cx="417" cy="498" r="8" fill="#dc2626"/><text x="436" y="503" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">+</text>
  <circle cx="183" cy="362" r="8" fill="#dc2626"/><text x="166" y="358" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">−</text>

  <!-- charge = the gauge direction (lateral), picked up on the closing leg -->
  <ellipse cx="232" cy="262" rx="34" ry="14" fill="none" stroke="#a16207" stroke-width="1.6"/>
  <text x="232" y="267" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">&gt; &lt;</text>
  <text x="232" y="244" text-anchor="middle" font-size="10" fill="#a16207">charge — handedness (lateral)</text>

  <!-- ===================== ELECTRON (on top) ===================== -->
  <ellipse cx="300" cy="150" rx="112" ry="46" fill="#fdf2f8" stroke="#d63384" stroke-width="2.4"/>
  <ellipse cx="300" cy="150" rx="88" ry="32" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="158" text-anchor="middle" font-size="22" font-weight="700" fill="#ea580c">^&gt;</text>
  <text x="244" y="155" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">−</text>
  <text x="300" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">electron</text>
  <text x="300" y="180" text-anchor="middle" font-size="9.5" fill="#9a3412">closure starts</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(612,250)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#111827">the closure path</text>
    <line x1="2" y1="22" x2="42" y2="22" stroke="#ea580c" stroke-width="3" marker-end="url(#arr)"/>
    <text x="52" y="26" font-size="12" fill="#374151">traverses each</text>
    <text x="52" y="42" font-size="12" fill="#374151">dimension end-to-end</text>
    <line x1="2" y1="60" x2="42" y2="60" stroke="#ea580c" stroke-width="3" stroke-dasharray="5 4" marker-end="url(#arr)"/>
    <text x="52" y="64" font-size="12" fill="#374151">connector (across quarks)</text>

    <text x="0" y="100" font-size="13" font-weight="700" fill="#111827">3 internal dimensions</text>
    <line x1="2" y1="120" x2="40" y2="120" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/><text x="50" y="124" font-size="12" fill="#374151">R  = + … −</text>
    <line x1="2" y1="142" x2="40" y2="142" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/><text x="50" y="146" font-size="12" fill="#374151">G  = ^ … v</text>
    <line x1="2" y1="164" x2="40" y2="164" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/><text x="50" y="168" font-size="12" fill="#374151">B  = / … \</text>
    <text x="0" y="188" font-size="11" fill="#6b7280">each a “bit of two” (two ends)</text>

    <text x="0" y="224" font-size="13" font-weight="700" fill="#111827">quarks</text>
    <ellipse cx="20" cy="246" rx="20" ry="11" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="50" y="250" font-size="12" fill="#374151">each holds 2 dimension-ends</text>

    <ellipse cx="14" cy="278" rx="22" ry="11" fill="none" stroke="#a16207" stroke-width="1.6"/>
    <text x="14" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">&gt; &lt;</text>
    <text x="50" y="282" font-size="12" fill="#374151">charge — handedness</text>

    <text x="0" y="318" font-size="11" fill="#6b7280" font-style="italic">the 3 dimensions cross (Borromean);</text>
    <text x="0" y="334" font-size="11" fill="#6b7280" font-style="italic">the closure runs along each, end to</text>
    <text x="0" y="350" font-size="11" fill="#6b7280" font-style="italic">end. Count-balanced. See §7.</text>
  </g>
</svg>
