<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">One closure-resonance substrate — inner ↔ outer</text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#6b7280">the same icosahedral geometry, rendered at different frequencies</text>

  <!-- INNER blanket (small, high frequency) -->
  <g transform="translate(175,205)">
    <circle r="66" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <polygon points="0,-50 47.6,-15.5 29.4,40.5 -29.4,40.5 -47.6,-15.5" fill="none" stroke="#2563eb" stroke-width="1.6"/>
    <g stroke="#93c5fd" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-50"/><line x1="0" y1="0" x2="47.6" y2="-15.5"/>
      <line x1="0" y1="0" x2="29.4" y2="40.5"/><line x1="0" y1="0" x2="-29.4" y2="40.5"/>
      <line x1="0" y1="0" x2="-47.6" y2="-15.5"/>
    </g>
    <circle r="3" fill="#2563eb"/>
    <text x="0" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">INNER SPACE</text>
    <text x="0" y="114" text-anchor="middle" font-size="12" fill="#374151">particle · atom · mind</text>
    <text x="0" y="131" text-anchor="middle" font-size="12" fill="#6b7280">high frequency · short period</text>
  </g>

  <!-- OUTER blanket (large, low frequency) -->
  <g transform="translate(585,205)">
    <circle r="100" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <polygon points="0,-76 72.3,-23.5 44.7,61.5 -44.7,61.5 -72.3,-23.5" fill="none" stroke="#7c3aed" stroke-width="1.6"/>
    <g stroke="#c4b5fd" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-76"/><line x1="0" y1="0" x2="72.3" y2="-23.5"/>
      <line x1="0" y1="0" x2="44.7" y2="61.5"/><line x1="0" y1="0" x2="-44.7" y2="61.5"/>
      <line x1="0" y1="0" x2="-72.3" y2="-23.5"/>
    </g>
    <circle r="3" fill="#7c3aed"/>
    <text x="0" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">OUTER SPACE</text>
    <text x="0" y="142" text-anchor="middle" font-size="12" fill="#374151">cosmos · horizon</text>
    <text x="0" y="159" text-anchor="middle" font-size="12" fill="#6b7280">low frequency · long period</text>
  </g>

  <!-- bidirectional bridge -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>
  <line x1="258" y1="188" x2="468" y2="188" stroke="#111827" stroke-width="2.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="363" y="176" text-anchor="middle" font-size="13" fill="#111827">same geometry, tuned by frequency</text>
  <text x="363" y="210" text-anchor="middle" font-size="14" font-style="italic" fill="#374151">f = 1/R</text>
</svg>
