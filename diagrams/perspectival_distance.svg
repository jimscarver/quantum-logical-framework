<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Distance is the rendering's, not the substrate's</text>
  <text x="380" y="54" text-anchor="middle" font-size="12.5" fill="#6b7280">ER = EPR: entangled ends are adjacent in the substrate (one shared closure) yet far apart in synthesized 3-D</text>

  <!-- synthesized-space slab -->
  <rect x="70" y="92" width="620" height="150" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="90" y="114" font-size="12.5" font-weight="700" fill="#1d4ed8">synthesized 3-D space</text>

  <!-- the long path through space -->
  <path d="M150,196 C 290,120 470,120 610,196" fill="none" stroke="#2563eb" stroke-width="2.4" stroke-dasharray="2 0"/>
  <text x="380" y="128" text-anchor="middle" font-size="13" fill="#1d4ed8">through space — distance LARGE</text>

  <!-- the two ends -->
  <circle cx="150" cy="196" r="9" fill="#2563eb"/>
  <text x="150" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">A</text>
  <circle cx="610" cy="196" r="9" fill="#2563eb"/>
  <text x="610" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">B</text>

  <!-- the shared-closure bridge (substrate adjacency) -->
  <path d="M150,196 C 300,300 460,300 610,196" fill="none" stroke="#7c3aed" stroke-width="2.4" stroke-dasharray="7 5"/>
  <g transform="translate(380,283)">
    <polygon points="0,-13 13,0 0,13 -13,0" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">ZFA</text>
  </g>
  <text x="380" y="330" text-anchor="middle" font-size="13" fill="#6d28d9">one shared closure — closure-distance ZERO (adjacent)</text>

  <text x="380" y="76" text-anchor="middle" font-size="12" font-style="italic" fill="#374151">the same two ends · one substrate link · two different "distances"</text>
</svg>
