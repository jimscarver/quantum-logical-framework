<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Why "prime" is the operative word — the topological lock</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#6b7280">a prime period has no smaller whole-number sub-cycle, so the vacuum cannot factor it</text>
  <line x1="380" y1="80" x2="380" y2="350" stroke="#e5e7eb" stroke-width="2"/>

  <!-- PRIME (locked) -->
  <g transform="translate(190,205)">
    <text x="0" y="-95" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">PRIME period (3)</text>
    <circle r="60" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
    <polygon points="0,-60 52,30 -52,30" fill="none" stroke="#059669" stroke-width="2"/>
    <circle cx="0" cy="-60" r="5" fill="#059669"/>
    <circle cx="52" cy="30" r="5" fill="#059669"/>
    <circle cx="-52" cy="30" r="5" fill="#059669"/>
    <!-- padlock -->
    <g transform="translate(0,2)">
      <path d="M -11 -6 a 11 11 0 0 1 22 0" fill="none" stroke="#065f46" stroke-width="3.5"/>
      <rect x="-16" y="-6" width="32" height="24" rx="3.5" fill="#10b981" stroke="#065f46" stroke-width="2"/>
      <circle cx="0" cy="5" r="3" fill="#065f46"/>
    </g>
    <text x="0" y="86" text-anchor="middle" font-size="12.5" fill="#374151">no whole-number sub-cycle</text>
    <text x="0" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">irreducible → LOCKED · stable</text>
    <text x="0" y="122" text-anchor="middle" font-size="12" fill="#6b7280">(the proton, n = 3)</text>
  </g>

  <!-- COMPOSITE (factors / comes apart) -->
  <g transform="translate(570,205)">
    <text x="0" y="-95" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">COMPOSITE period (6 = 2 × 3)</text>
    <!-- two sub-loops pulling apart -->
    <g transform="translate(-34,0)">
      <circle r="40" fill="#fff7ed" stroke="#ea580c" stroke-width="3" stroke-dasharray="5 5"/>
      <circle cx="0" cy="-40" r="4" fill="#ea580c"/><circle cx="35" cy="20" r="4" fill="#ea580c"/><circle cx="-35" cy="20" r="4" fill="#ea580c"/>
    </g>
    <g transform="translate(34,0)">
      <circle r="40" fill="#fff7ed" stroke="#ea580c" stroke-width="3" stroke-dasharray="5 5"/>
      <circle cx="0" cy="-40" r="4" fill="#ea580c"/><circle cx="35" cy="20" r="4" fill="#ea580c"/><circle cx="-35" cy="20" r="4" fill="#ea580c"/>
    </g>
    <!-- break in the middle -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#9a3412" stroke-width="2.5" stroke-dasharray="3 4"/>
    <text x="0" y="86" text-anchor="middle" font-size="12.5" fill="#374151">factors into sub-repeats</text>
    <text x="0" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">→ comes apart · can decay</text>
  </g>
</svg>
