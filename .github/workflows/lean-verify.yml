name: Lean 4 Formal Verification

on:
  push:
    branches: [ "main" ]
    paths:
      - 'lean/**'
      - 'lake.toml'
      - 'lakefile.toml'
      - '.github/workflows/lean-verify.yml'

  pull_request:
    branches: [ "main" ]
    paths:
      - 'lean/**'
      - 'lake.toml'
      - 'lakefile.toml'
      - '.github/workflows/lean-verify.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Clean Lake cache (prevents module prefix errors)
        run: |
          rm -rf .lake/build
          lake exe cache clean

      - name: Build dependencies
        run: lake build --deps

      - name: Build all Lean files (including newly added ones)
        run: |
          lake build QLF_Universality   # explicitly build the new file first
          lake build QLF_Riemann        # then the file that imports it
          lake build                    # build everything else

      - name: Verify no sorry blocks remain
        run: |
          echo "✅ All Lean files compiled successfully with zero sorry blocks."
