name: Lean 4 Formal Verification

on:
  push:
    branches: [ "main" ]
    paths:
      - 'lean/**'           # any file inside the lean/ folder
      - 'lake.toml'         # lake configuration
      - 'lakefile.toml'     # lake configuration
      - '.github/workflows/lean-verify.yml'  # the workflow itself (optional)

  pull_request:
    branches: [ "main" ]
    paths:
      - 'lean/**'
      - 'lake.toml'
      - 'lakefile.toml'
      - '.github/workflows/lean-verify.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install elan (Lean version manager)
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Build and Verify Mathlib Dependencies
      run: lake build
